services:
  slik-mobile-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: slik-mobile-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
